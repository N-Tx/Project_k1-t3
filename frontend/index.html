<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TODO List</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="container">
        <h1>To do list</h1>
        
        <div class="form-section">
            <h2 id="form-title">Nova Tarefa</h2>
            <form id="task-form">
                <input type="text" id="title" placeholder="Título da tarefa" required>
                <textarea id="description" placeholder="Descrição da tarefa" required></textarea>
                <select id="status">
                    <option value="TODO">TODO (A Fazer)</option>
                    <option value="DOING">DOING (Fazendo)</option>
                    <option value="DONE">DONE (Feito)</option>
                </select>
                <select id="priority">
                    <option value="1">Prioridade 1</option>
                    <option value="2">Prioridade 2</option>
                    <option value="3">Prioridade 3</option>
                    <option value="4">Prioridade 4</option>
                    <option value="5">Prioridade 5</option>
                </select>

                <select id="category">
                    <option value="WORK">Trabalho</option>
                    <option value="STUDY">Estudo</option>
                    <option value="PERSONAL">Pessoal</option>
                </select>

                <div class="form-actions">
                    <button type="submit" id="submit-btn">Salvar Tarefa</button>
                    <button type="button" id="cancel-btn" class="hidden">Cancelar Edição</button>
                </div>
            </form>
        </div>


        <div class="list-section">
            <div class="list-header">
                <h2>Suas Tarefas</h2>
                <select id="filter-status">
                    <option value="ALL">Todas</option>
                    <option value="TODO">TODO</option>
                    <option value="DOING">DOING</option>
                    <option value="DONE">DONE</option>
                </select>
                <select id="filter-priority">
                    <option value="ALL">Todas Prioridades</option>
                    <option value="1">Prioridade 1</option>
                    <option value="2">Prioridade 2</option>
                    <option value="3">Prioridade 3</option>
                    <option value="4">Prioridade 4</option>
                    <option value="5">Prioridade 5</option>
                </select>
                
                <select id="filter-category">
                    <option value="ALL">Todas Categorias</option>
                    <option value="WORK">Trabalho</option>
                    <option value="STUDY">Estudo</option>
                    <option value="PERSONAL">Pessoal</option>
                </select>

                </div>
            </div>
            <ul id="task-list"></ul>
        </div>
    </div>



    <script src="js/app.js"></script>
</body>
</html>
